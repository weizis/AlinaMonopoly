<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AlinaMonopoly | Драмакоины</title>
    <link rel="stylesheet" href="style.css">
    <script src="users.js"></script>
</head>
<body class="dramacoins-page">
    <header class="top-bar">
        <div class="edit-button" id="backButton">
            <img src="assets/back.png" alt="Назад" class="edit-icon">
        </div>
        <div class="logo-placeholder"></div>
        <span class="logo-text">AlinaMonopoly</span>
        <div class="edit-button" id="menuButton">
            <img src="assets/menu.png" alt="Меню" class="edit-icon">
        </div>
    </header>

    <!-- Меню -->
    <div id="menuOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;"></div>
    <div id="menuPanel" style="position:fixed; top:0; left:-280px; width:280px; height:100%; background:#FFBDD9; z-index:1000; transition:left 0.3s; box-shadow:2px 0 10px rgba(0,0,0,0.1);">
        <div style="display:flex; justify-content:space-between; align-items:center; padding:20px; border-bottom:1px solid rgba(231,84,128,0.3);">
            <span style="font-size:20px; font-weight:700; color:#E75480;">Меню</span>
            <button id="closeMenuBtn" style="background:none; border:none; font-size:28px; color:#E75480; cursor:pointer;">✕</button>
        </div>
        <a href="profile.html" style="display:flex; align-items:center; gap:15px; padding:15px 20px; text-decoration:none; border-bottom:1px solid rgba(231,84,128,0.2);">
            <img src="assets/home.png" style="width:24px; height:24px;">
            <span style="font-size:16px; color:#E75480;">Главная</span>
        </a>
        <a href="info.html" style="display:flex; align-items:center; gap:15px; padding:15px 20px; text-decoration:none; border-bottom:1px solid rgba(231,84,128,0.2);">
            <img src="assets/info.png" style="width:24px; height:24px;">
            <span style="font-size:16px; color:#E75480;">Инструкция</span>
        </a>
        <a href="coin.html" style="display:flex; align-items:center; gap:15px; padding:15px 20px; text-decoration:none; border-bottom:1px solid rgba(231,84,128,0.2); background:rgba(231,84,128,0.3);">
            <img src="assets/coin.png" style="width:24px; height:24px;">
            <span style="font-size:16px; color:#E75480;">Драмакоины</span>
        </a>
        <a href="cards.html" style="display:flex; align-items:center; gap:15px; padding:15px 20px; text-decoration:none; border-bottom:1px solid rgba(231,84,128,0.2);">
            <img src="assets/cards.png" style="width:24px; height:24px;">
            <span style="font-size:16px; color:#E75480;">Карточки</span>
        </a>
        <a href="index.html" id="logoutBtn" style="display:flex; align-items:center; gap:15px; padding:15px 20px; text-decoration:none; border-bottom:1px solid rgba(231,84,128,0.2);">
                <img src="assets/logout.png" style="width:24px; height:24px;" onerror="this.src='assets/home.png'">
                <span style="font-size:16px; color:#E75480;">Выйти</span>
            </a>
    </div>

    <main class="main-content dramacoins-content">
        <div class="dramacoins-container">
            <h1 class="dramacoins-title">Драмакоины</h1>
            
            <div class="score-card">
                <div class="score-value" id="currentScore">50</div>
                <div class="score-label">Твой счет</div>
            </div>
            
            <div class="edit-score-section">
                <input type="number" class="amount-input" id="editAmount" placeholder="Введите сумму" value="1">
                <div class="action-buttons">
                    <button class="action-btn plus-btn" id="plusBtn">+</button>
                    <button class="action-btn minus-btn" id="minusBtn">-</button>
                </div>
            </div>
            
            <div class="users-table-container">
                <table class="users-table">
                    <thead>
                        <tr><th>Пользователь</th><th>Счет</th></tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Заполняется через JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="bottom-bar">
        <div class="bottom-nav">
            <a href="info.html" class="bottom-nav-item">
                <img src="assets/info.png" alt="Инструкция" class="bottom-icon">
            </a>
            <a href="profile.html" class="bottom-nav-item">
                <img src="assets/home.png" alt="Профиль" class="bottom-icon">
            </a>
            <a href="cards.html" class="bottom-nav-item">
                <img src="assets/cards.png" alt="Карточки" class="bottom-icon">
            </a>
        </div>
    </footer>

    <script>
        // Проверка авторизации
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'main.html';
        }
        
        const currentUserName = currentUser.name;
        
        // Данные пользователей для таблицы
        let usersScores = {};
        const savedScores = localStorage.getItem('dramacoinsScores');
        
        if (savedScores) {
            usersScores = JSON.parse(savedScores);
        } else {
            users.forEach(user => {
                usersScores[user.name] = user.dramaProgress;
            });
            localStorage.setItem('dramacoinsScores', JSON.stringify(usersScores));
        }
        
        function saveScores() {
            localStorage.setItem('dramacoinsScores', JSON.stringify(usersScores));
            // Обновляем профиль текущего пользователя в localStorage
            if (currentUser) {
                currentUser.dramaProgress = usersScores[currentUserName];
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
            }
        }
        
        function updateTable() {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            
            const sortedUsers = [...users].sort((a, b) => a.name.localeCompare(b.name));
            
            sortedUsers.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.name}</td>
                    <td class="score-cell" data-user="${user.name}">${usersScores[user.name] || 0}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function updateCurrentScore() {
            const currentScoreSpan = document.getElementById('currentScore');
            currentScoreSpan.textContent = usersScores[currentUserName] || 0;
        }
        
        function changeScore(amount) {
            const editAmount = parseInt(document.getElementById('editAmount').value);
            if (isNaN(editAmount) || editAmount <= 0) {
                showNotification('Введите корректную сумму', true);
                return;
            }
            
            let newScore = usersScores[currentUserName] + amount * editAmount;
            if (newScore < 0) newScore = 0;
            if (newScore > 100) newScore = 100;
            
            usersScores[currentUserName] = newScore;
            saveScores();
            updateTable();
            updateCurrentScore();
            
            const action = amount > 0 ? 'увеличили' : 'уменьшили';
            showNotification(`Вы ${action} счет на ${editAmount} драмакоинов!`, false);
        }
        
        function showNotification(message, isError = true) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                bottom: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: ${isError ? '#E75480' : '#4CAF50'};
                color: #FFE4F4;
                padding: 12px 20px;
                border-radius: 30px;
                font-size: 14px;
                font-weight: 500;
                z-index: 1000;
                text-align: center;
                animation: fadeInOut 2.5s ease;
                max-width: 90vw;
                white-space: normal;
            `;
            
            document.body.appendChild(notification);
            setTimeout(() => {
                if (notification.parentNode) notification.remove();
            }, 2500);
        }
        
        // Меню
        const menuBtn = document.getElementById('menuButton');
        const menuPanel = document.getElementById('menuPanel');
        const menuOverlay = document.getElementById('menuOverlay');
        const closeMenuBtn = document.getElementById('closeMenuBtn');
        
        function openMenu() {
            menuPanel.style.left = '0';
            menuOverlay.style.display = 'block';
        }
        
        function closeMenu() {
            menuPanel.style.left = '-280px';
            menuOverlay.style.display = 'none';
        }
        
        if (menuBtn) menuBtn.onclick = openMenu;
        if (closeMenuBtn) closeMenuBtn.onclick = closeMenu;
        if (menuOverlay) menuOverlay.onclick = closeMenu;
        
        document.getElementById('backButton').onclick = () => {
            window.location.href = 'profile.html';
        };
        
        document.getElementById('plusBtn').onclick = () => changeScore(1);
        document.getElementById('minusBtn').onclick = () => changeScore(-1);
        
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
                15% { opacity: 1; transform: translateX(-50%) translateY(0); }
                85% { opacity: 1; transform: translateX(-50%) translateY(0); }
                100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            }
        `;
        document.head.appendChild(style);
        
        updateTable();
        updateCurrentScore();
    </script>
</body>
</html>
